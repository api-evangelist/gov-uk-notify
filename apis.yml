aid: gov-uk-notify
name: GOV.UK Notify
description: >-
  GOV.UK Notify is a UK government notification service operated by the Government Digital Service (GDS)
  that enables central government, local authorities, NHS organisations, and other eligible public bodies
  to send emails, text messages, and letters to citizens on behalf of government services. The platform
  provides a REST API, a web-based sending interface, and official client libraries for Python, Java,
  .NET, Node.js, PHP, and Ruby. Emails are free and unlimited; SMS messages include an annual free
  allowance by organisation type with per-message overage at 2.4p; physical letters are priced by
  postage class and page count with print and postage included. The API uses JWT-based authentication,
  supports template-driven personalisation, and enforces a throughput limit of 3,000 messages per
  minute per API key type.
