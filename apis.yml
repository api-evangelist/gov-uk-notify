    name: GOV.UK Notify Python Client
    description: >-
      Official Python client library for the GOV.UK Notify API. Wraps the REST API with idiomatic
      Python methods for sending SMS, email, and letter notifications; retrieving notification status;
      listing notifications with filtering; fetching templates and previewing them; and handling
      inbound received text messages. Available on PyPI as notifications-python-client.
    humanURL: https://docs.notifications.service.gov.uk/python.html
    baseURL: https://api.notifications.service.gov.uk
