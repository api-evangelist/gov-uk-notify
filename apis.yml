apis:

  - aid: gov-uk-notify:notifications-api
    name: GOV.UK Notify Notifications API
    description: >-
      The GOV.UK Notify REST API enables government services to programmatically send emails, text
      messages, and letters to citizens. It supports sending individual notifications and bulk sends
      via pre-defined templates with personalisation fields. The API also provides endpoints for
      retrieving notification status, listing past messages, fetching and previewing templates, and
      accessing received inbound text messages. Authentication uses short-lived JSON Web Tokens (JWT)
      derived from API keys issued per service. Three API key types exist: test (non-persisting),
      team/guest list (trial mode with recipient restrictions), and live (full production access).
    humanURL: https://docs.notifications.service.gov.uk/rest-api.html
    baseURL: https://api.notifications.service.gov.uk
    tags:
      - Notifications
      - Email
      - SMS
      - Letters
      - REST
      - JWT
      - Templates
      - Government
    properties:
      - type: Documentation
        url: https://docs.notifications.service.gov.uk/rest-api.html
      - type: Website
        url: https://www.notifications.service.gov.uk/

